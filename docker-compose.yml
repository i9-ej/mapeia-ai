version: "3.3"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clinicflow_db
    environment:
      POSTGRES_USER: clinicflow
      POSTGRES_PASSWORD: clinicflow_secret
      POSTGRES_DB: clinicflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: clinicflow_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicflow:clinicflow_secret@db:5432/clinicflow
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  uploads:
