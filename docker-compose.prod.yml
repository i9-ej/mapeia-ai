version: "3.3"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clinicflow_db_prod
    environment:
      POSTGRES_USER: clinicflow
      POSTGRES_PASSWORD: clinicflow_secret
      POSTGRES_DB: clinicflow
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: clinicflow_backend_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://clinicflow:clinicflow_secret@db:5432/clinicflow
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_prod:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api-backend
    container_name: clinicflow_frontend_prod
    environment:
      NEXT_PUBLIC_API_URL: /api-backend
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: clinicflow_nginx_prod
    ports:
      - "80:80"
      # Se você for configurar HTTPS depois via Certbot/Cloudflare, pode adicionar 443
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata_prod:
  uploads_prod:
